<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>圓角</title>
</head>
<body class="p-4">
  <div class="flex flex-wrap gap-[2px]">
    <div class="w-[100px] h-[100px] bg-amber-400 rounded-none mb-4"></div>
    <div class="w-[100px] h-[100px] bg-amber-400 rounded-sm mb-4"></div>
    <div class="w-[100px] h-[100px] bg-amber-400 rounded-md mb-4"></div>
    <div class="w-[100px] h-[100px] bg-amber-400 rounded-lg mb-4"></div>
    <div class="w-[100px] h-[100px] bg-amber-400 rounded-2xl mb-4"></div>
    <div class="w-[100px] h-[100px] bg-amber-400 rounded-tl-3xl mb-4"></div>
    <div class="w-[100px] h-[100px] bg-amber-400 rounded-bl-3xl mb-4"></div>
    <div class="w-[100px] h-[100px] bg-amber-400 rounded-bl-3xl rounded-tr-3xl mb-4"></div>
  </div>



  <div class="w-[100px] h-[100px] bg-amber-400 rounded-full mb-4"></div>
  <div class="w-[200px] h-[100px] bg-amber-400 rounded-full mb-4"></div>
</body>
</html>
