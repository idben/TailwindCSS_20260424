<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root{
      --b: 8px;
    }
  </style>
  <title>外框線</title>
</head>
<body class="p-4">
  <div class="w-[200px] h-[60px] bg-lime-200 border border-lime-600 mb-2"></div>
  <div class="w-[200px] h-[60px] bg-lime-200 border-4 border-lime-600 mb-2"></div>
  <div class="w-[200px] h-[60px] bg-lime-200 border-[4px] border-lime-600 mb-2"></div>
  <div class="w-[200px] h-[60px] bg-lime-200 border-l-4 border-lime-600 mb-2"></div>
  <div class="w-[200px] h-[60px] bg-lime-200 border-t-4 border-lime-600 mb-2"></div>
  <!-- end -> right -->
  <div class="w-[200px] h-[60px] bg-lime-200 border-e-4 border-lime-600 mb-2"></div>
  <div class="w-[200px] h-[60px] bg-lime-200 border-b-4 border-lime-600 mb-2"></div>

  <div class="w-[200px] h-[60px] bg-lime-200 border-b-[length:var(--b)] border-lime-600 mb-2"></div>
</body>
</html>
