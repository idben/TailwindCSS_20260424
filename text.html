<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root{
      --value-1: 36px;
      --value-2: 26px;
      --value-3: #ec10ec;
    }
  </style>
  <title>文字顏色</title>
</head>
<body>
  <p class="text-red-200 text-4xl">紅色文字 (red-200)</p>
  <p class="text-red-500 text-xs">紅色文字 (red-500)</p>
  <p class="text-blue-200 text-[26px]">藍色文字 (blue-200)</p>
  <p class="text-blue-700 text-[length:var(--value-1)]">藍色文字 (blue-700)</p>
  <p class="text-slate-200 text-(length:--value-2)">淺灰文字 (slate-200)</p>
  <!-- text-[] 要加 color: 才知道控制的是顏色 -->
  <p class="text-slate-900 !text-[color:#ec10ec]">深灰文字 (slate-900)</p>
  <!-- 正式寫法 -->
  <p class="text-slate-900 !text-[color:var(--value-3)]">深灰文字 (slate-900)</p>
  <!-- 簡化寫法 -->
  <p class="text-slate-900 !text-(color:--value-3) font-[100]">深灰文字 (slate-900)</p>
  <p class="text-slate-900 !text-(color:--value-3) font-[200]">深灰文字 (slate-900)</p>
  <p class="text-slate-900 !text-(color:--value-3) font-[300]">深灰文字 (slate-900)</p>
  <p class="text-slate-900 !text-(color:--value-3) font-[400]">深灰文字 (slate-900)</p>
  <p class="text-slate-900 !text-(color:--value-3) font-[500]">深灰文字 (slate-900)</p>
  <p class="text-slate-900 !text-(color:--value-3) font-[600]">深灰文字 (slate-900)</p>
  <p class="text-slate-900 !text-(color:--value-3) font-[700]">深灰文字 (slate-900)</p>
  <p class="text-slate-900 !text-(color:--value-3) font-[800]">深灰文字 (slate-900)</p>
  <p class="text-slate-900 !text-(color:--value-3) font-[900]">深灰文字 (slate-900)</p>

</body>
</html>
